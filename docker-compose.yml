services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: limbu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - limbu_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: limbu_redis
    restart: unless-stopped
    # Self-hosted, local-network only — no per-request billing, no
    # quota to run out of. Celery alone issues a very high volume of
    # Redis commands (broker polling, unacked-message visibility
    # scans, task publish/ack) that quickly exhausts a metered plan
    # like Upstash's free tier ("max requests limit exceeded").
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - limbu_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limbu_backend
    restart: unless-stopped
    env_file: .env.production
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - limbu_net
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limbu_celery_worker
    # Separate process from the API — a burst of campaigns/KB-crawls
    # now competes with nothing but itself for CPU and DB-pool slots,
    # so app.deenxconsultancy.com stays responsive no matter how much
    # background work is queued.
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q default,webhooks,campaigns,ai
    restart: unless-stopped
    env_file: .env.production
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - limbu_net
    volumes:
      - backend_logs:/app/logs

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limbu_celery_beat
    # Runs the periodic jobs (template status sync, stale-session
    # cleanup) — one instance only, never scale this one horizontally.
    command: celery -A app.core.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: .env.production
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - limbu_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: limbu_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - limbu_net

  nginx:
    image: nginx:alpine
    container_name: limbu_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - limbu_net

  certbot:
    image: certbot/certbot
    container_name: limbu_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  certbot_www:
  certbot_certs:

networks:
  limbu_net:
    driver: bridge