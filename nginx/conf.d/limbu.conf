server {
    listen 80;
    server_name app.deenxconsultancy.com api.deenxconsultancy.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.deenxconsultancy.com;

    ssl_certificate /etc/letsencrypt/live/app.deenxconsultancy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.deenxconsultancy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.deenxconsultancy.com;

    ssl_certificate /etc/letsencrypt/live/app.deenxconsultancy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.deenxconsultancy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # CORS headers
    add_header 'Access-Control-Allow-Origin' 'https://app.deenxconsultancy.com' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Workspace-Id' always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # WebSocket — MUST be before location /
    location /api/v1/ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}